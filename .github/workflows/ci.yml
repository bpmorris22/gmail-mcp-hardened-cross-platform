name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Audit dependencies
        run: python -m pip install pip-audit && python -m pip_audit -r requirements.txt
      - name: Compile Python modules
        run: python -m py_compile auth.py config.py gcalendar.py gmail.py server.py setup_auth.py
      - name: Run smoke test
        run: python -m unittest discover -s tests
